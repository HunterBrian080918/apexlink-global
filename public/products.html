<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="Browse the AvelixLink product catalog with pricing, product details, and delivery information."
  >
  <title>Products | AvelixLink</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet"
  >
  <script>document.documentElement.classList.add("page-transition-init");</script>
  <link rel="stylesheet" href="/styles.css">
  <link rel="icon" type="image/png" href="/assets/brand/avelixlink-favicon.png">
</head>
<body class="products-page">
  <header class="products-nav-shell">
    <div data-public-nav data-nav-id="products-navigation"></div>
  </header>

  <main>
    <section class="section section-light products-page-section">
      <div class="container products-content">
        <div class="products-match-controls reveal">
          <a class="btn btn-primary" id="products-match-toggle" href="/workspace-finder">
            Find My Workspace Setup
          </a>
        </div>
        <div class="products-match-state" id="products-match-state" hidden></div>
        <div class="product-grid" id="product-grid"></div>
      </div>
    </section>
  </main>

  <div data-public-footer></div>
  <div data-support-fab></div>

  <script src="/page-transition.js"></script>
  <script src="/data-store.js"></script>
  <script src="/public-shell.js"></script>
  <script src="/site-config.js"></script>
  <script src="/matching.js"></script>
  <script src="/products.js"></script>
</body>
</html>
