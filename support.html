<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="Contact the AvelixLink support team for product guidance, delivery information, and order assistance."
  >
  <title>Support | AvelixLink</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet"
  >
  <script>document.documentElement.classList.add("page-transition-init");</script>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="assets/brand/apexlink-favicon.png">
</head>
<body class="support-page">
  <header class="hero-shell subpage-shell">
    <div data-public-nav data-nav-id="support-navigation"></div>
  </header>

  <main>
    <section class="section section-light support-section">
      <div class="container support-layout">
        <section class="support-chat-panel reveal" aria-label="Workspace Assistant chat">
          <div class="support-chat-card">
            <form class="support-identity-panel" id="support-identity-form" autocomplete="on">
              <div class="support-identity-grid" id="support-identity-panel">
                <label>
                  <span class="sr-only">Name</span>
                  <input
                    id="support-name"
                    name="customerName"
                    type="text"
                    placeholder="Your name"
                    autocomplete="name"
                  >
                </label>
                <label>
                  <span class="sr-only">Email</span>
                  <input
                    id="support-email"
                    name="customerEmail"
                    type="email"
                    placeholder="Your email"
                    autocomplete="email"
                  >
                </label>
                <label>
                  <span class="sr-only">Phone</span>
                  <input
                    id="support-phone"
                    name="customerPhone"
                    type="tel"
                    placeholder="Phone (optional)"
                    autocomplete="tel"
                  >
                </label>
                <label>
                  <span class="sr-only">Country</span>
                  <input
                    id="support-country"
                    name="customerCountry"
                    type="text"
                    placeholder="Country (optional)"
                    autocomplete="country-name"
                  >
                </label>
                <label class="support-identity-subject">
                  <span class="sr-only">Subject</span>
                  <input
                    id="support-subject"
                    name="subject"
                    type="text"
                    placeholder="Subject (optional)"
                    autocomplete="off"
                  >
                </label>
              </div>
            </form>

            <div class="chat-window" id="chat-window" aria-live="polite"></div>

            <form class="chat-form" id="chat-form">
              <label class="sr-only" for="chat-input">Message</label>
              <input
                id="chat-input"
                name="message"
                type="text"
                placeholder="Ask about products, pricing, shipping or workspace setup..."
                autocomplete="off"
              >
              <button class="chat-submit-button" type="submit" aria-label="Send message">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M3.4 11.2 19.8 4.1c.9-.4 1.8.5 1.4 1.4l-7.1 16.4c-.4 1-1.8.9-2.1-.1L9.8 14l-7.7-2.2c-1-.3-1.1-1.7-.1-2.1l.1-.1 7.7 2.2 2.2 7.7 1.8-6.2 5.3-5.3-6.2 1.8-7.7 2.2z"/>
                </svg>
                <span>Send</span>
              </button>
            </form>
            <p class="form-status support-form-status" id="support-form-status" aria-live="polite"></p>
          </div>
        </section>
      </div>
    </section>
  </main>

  <div data-public-footer></div>
  <div data-support-fab></div>

  <script src="page-transition.js"></script>
  <script src="data-store.js"></script>
  <script src="public-shell.js"></script>
  <script src="site-config.js"></script>
  <script src="support.js"></script>
</body>
</html>
